<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fond rouge arrondi — couleur primaire du site -->
  <rect width="32" height="32" rx="6" fill="#e63946"/>

  <!-- Livre ouvert : page gauche -->
  <rect x="4" y="7" width="11" height="18" rx="1.5" fill="#fff" opacity="0.95"/>
  <!-- Reliure centrale -->
  <rect x="15" y="7" width="2" height="18" rx="0" fill="#c1121f"/>
  <!-- Livre ouvert : page droite -->
  <rect x="17" y="7" width="11" height="18" rx="1.5" fill="#fff" opacity="0.95"/>

  <!-- Légères lignes de texte — page gauche -->
  <rect x="6.5" y="12" width="6.5" height="1.5" rx="0.75" fill="#e63946" opacity="0.7"/>
  <rect x="6.5" y="15" width="6.5" height="1.5" rx="0.75" fill="#e63946" opacity="0.7"/>
  <rect x="6.5" y="18" width="4" height="1.5" rx="0.75" fill="#e63946" opacity="0.5"/>

  <!-- Légères lignes de texte — page droite -->
  <rect x="19" y="12" width="6.5" height="1.5" rx="0.75" fill="#e63946" opacity="0.7"/>
  <rect x="19" y="15" width="6.5" height="1.5" rx="0.75" fill="#e63946" opacity="0.7"/>
  <rect x="19" y="18" width="4" height="1.5" rx="0.75" fill="#e63946" opacity="0.5"/>

  <!-- Signet rouge foncé en haut de la page droite -->
  <polygon points="24,7 26,7 26,12 25,11 24,12" fill="#c1121f"/>
</svg>
